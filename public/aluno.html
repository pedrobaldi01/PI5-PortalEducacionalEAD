<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Painel do Aluno | Portal Educacional</title>

    <link rel="stylesheet" href="css/styles.css" />
    <script src="js/api.js" defer></script>
    <script src="js/session.js" defer></script>
    <script src="js/ui.js" defer></script>
    <script src="js/components.js" defer></script>
    <script src="js/aluno.js" defer></script>
  </head>

  <body data-page="aluno">
    <div id="header-container"></div>

    <div class="app-layout">
      <div id="sidebar-container"></div>

      <main class="content">
        <section class="page-header">
          <div>
            <p class="eyebrow">Área do aluno</p>
            <h1>Bem-vindo ao seu painel</h1>
            <p>
              Acompanhe suas turmas, disciplinas, conteúdos, atividades, avisos e notas.
            </p>
          </div>
        </section>

        <section class="summary-grid" id="resumo-aluno" aria-label="Resumo do aluno">
          <article class="summary-card summary-card-loading">
            <span class="summary-label">Carregando</span>
            <strong>...</strong>
            <p>buscando dados do banco</p>
          </article>
        </section>

        <section class="dashboard-grid">
          <article class="panel" id="disciplinas">
            <div class="panel-header">
              <h2>Minhas turmas e disciplinas</h2>
            </div>
            <div id="disciplinas-lista" class="course-list"></div>
          </article>

          <article class="panel" id="atividades">
            <div class="panel-header">
              <h2>Atividades próximas</h2>
            </div>
            <div id="atividades-lista"></div>
          </article>

          <article class="panel" id="conteudos">
            <div class="panel-header">
              <h2>Conteúdos recentes</h2>
            </div>
            <div id="conteudos-lista"></div>
          </article>

          <article class="panel" id="notas">
            <div class="panel-header">
              <h2>Últimas notas</h2>
            </div>
            <div id="notas-lista"></div>
          </article>

          <article class="panel panel-wide" id="avisos">
            <div class="panel-header">
              <h2>Avisos</h2>
            </div>
            <div id="avisos-lista"></div>
          </article>
        </section>
      </main>
    </div>

    <div id="footer-container"></div>
  </body>
</html>
